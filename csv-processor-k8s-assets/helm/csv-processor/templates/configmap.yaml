apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "csv-processor.fullname" . }}-config
  labels:
    {{- include "csv-processor.labels" . | nindent 4 }}
data:
  APP_PORT: {{ .Values.app.port | quote }}
  AWS_REGION: {{ .Values.config.awsRegion | quote }}
  S3_BUCKET: {{ .Values.config.s3Bucket | quote }}
  S3_STORAGE_CLASS: {{ .Values.config.s3StorageClass | quote }}
  MAX_UPLOAD_BYTES: {{ .Values.config.maxUploadBytes | quote }}
  {{- if .Values.config.s3EndpointUrl }}
  S3_ENDPOINT_URL: {{ .Values.config.s3EndpointUrl | quote }}
  {{- end }}
  nginx.conf: |
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /tmp/nginx.pid;
    events { worker_connections 1024; }
    http {
      include /etc/nginx/mime.types;
      default_type application/octet-stream;
      sendfile on;
      upstream app_backend { server 127.0.0.1:{{ .Values.app.port }}; }
      server {
        listen {{ .Values.nginx.port }};
        location /static/ {
          alias {{ .Values.sharedStatic.mountPath }}/;
          expires 1h;
        }
        location / {
          proxy_pass http://app_backend;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
        }
        location /health {
          proxy_pass http://app_backend/health;
        }
      }
    }
