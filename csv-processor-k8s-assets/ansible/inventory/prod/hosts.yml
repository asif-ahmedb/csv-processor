all:
  children:
    kubernetes:
      hosts:
        localhost:
          ansible_connection: local
  vars:
    environment: production
    # Required — set before running:
    #   image_repository: 123456789.dkr.ecr.us-east-1.amazonaws.com/csv-processor
    #   image_tag: <git-sha or semver>  (avoid 'latest' in production)
    #   s3_bucket: <terraform output s3_bucket_name>
    #   service_account_role_arn: <terraform output app_irsa_role_arn>
    image_repository: "REQUIRED_SET_ECR_URL"
    image_tag: "REQUIRED_SET_IMAGE_TAG"
    s3_bucket: "REQUIRED_SET_S3_BUCKET"
    replica_count: 3
    hpa_min: 3
    hpa_max: 20
    service_account_role_arn: "REQUIRED_SET_IRSA_ARN"
