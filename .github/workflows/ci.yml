name: Application CI

on:
  push:
    branches: [main, master]
    paths:
      - "csv-processor-app/**"
  pull_request:
    branches: [main, master]
    paths:
      - "csv-processor-app/**"

env:
  IMAGE_NAME: csv-processor

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: csv-processor-app/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v

  build-and-push:
    name: Build and push Docker image
    needs: test
    runs-on: ubuntu-latest
    # Push only on merge/push to main (not on PRs)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4

      - name: Check Docker Hub secrets
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ] || [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            exit 1
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: csv-processor-app
          file: csv-processor-app/Dockerfile
          push: true
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image on Docker Hub
        run: |
          IMAGE="docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}"
          docker buildx imagetools inspect "${IMAGE}:${{ github.sha }}"
          docker buildx imagetools inspect "${IMAGE}:latest"
          echo "Pushed and verified: ${IMAGE}:${{ github.sha }} and :latest"

  build-only:
    name: Build image (no push)
    needs: test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: csv-processor-app
          file: csv-processor-app/Dockerfile
          push: false
          tags: csv-processor:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
