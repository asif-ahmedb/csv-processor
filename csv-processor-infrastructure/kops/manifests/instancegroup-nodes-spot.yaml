apiVersion: kops.k8s.io/v1alpha2
kind: InstanceGroup
metadata:
  name: nodes-spot
  labels:
    kops.k8s.io/cluster: csv-processor.k8s.local
    node-role: worker
    lifecycle: spot
spec:
  role: Node
  instanceMetadata:
    httpPutResponseHopLimit: 2
  machineType: t3.small
  minSize: 0
  maxSize: 5
  subnets:
    - us-east-1a
    - us-east-1b
  maxPrice: "0.08"
  mixedInstancesPolicy:
    instances:
      - t3.small
      - t3.medium
      - t3a.small
      - t3a.medium
    onDemandAboveBase: 0
    onDemandBase: 0
    spotAllocationStrategy: capacity-optimized
  cloudLabels:
    k8s.io/cluster-autoscaler/enabled: "true"
    k8s.io/cluster-autoscaler/csv-processor.k8s.local: "owned"
    k8s.io/cluster-autoscaler/node-template/label/lifecycle: spot
  nodeLabels:
    lifecycle: spot
    node.kubernetes.io/lifecycle: spot
  kubelet:
    labels:
      lifecycle: spot
